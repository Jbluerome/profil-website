<!DOCTYPE html>
<html>
<head>
    <title>Profil Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <div class="card">
         
         <img src="me.jpeg"Foto Profil">

         <h1>Profil Saya</h1>
 
         <p>Nama: Saeful Ridwan</p>

         <p>Saya sedang belajar menjadi Web3 Developer.</p>
         <input type="text" id="namaInput" placeholder="Masukkan nama">

         <button onclick="tampilkanNama()">Tampilkan Nama</button>

         <p id="hasil"></p>

         <button onclick="ubahTeks()">Klik Saya</button>
          <p id="pesan">Saya sedang belajar JavaScript</p>

          <h2>Kalkulator Sederhana</h2>
        

         <input type="number" id="angka1" placeholder="Angka pertama">

        <input type="number" id="angka2" placeholder="Angka kedua">

         <button onclick="hitung()">Hitung</button>

         <p id="hasilHitung"></p>

         <h2>Game Tebak Angka</h2>

         <input type="number" id="tebakan" placeholder="Masukkan angka">

         <button onclick="cekTebakan()">
           Tebak
         </button>

         <p id="hasilTebakan"></p>

         <h2>To-Do List</h2>

         <input type="text" id="todoInput" placeholder="Masukkan tugas">

         <button onclick="tambahTugas()">
         Tambah
         </button>

         <ul id="daftarTugas"></ul>

         <a href="https://github.com/Jbluerome" target="_blank">
            GitHub Saya
         </a>

         <script>
         let angkaRahasia =
         Math.floor(Math.random() * 10) + 1;  

         function ubahTeks() {
         alert("Halo Saeful! Selamat Belajar Java Script!");

         document.getElementById("pesan").innerHTML =
         "Saya akan menjadi Web3 Developer!";
         }

         function tampilkanNama() {

         let nama =
         document.getElementById("namaInput").value;

         document.getElementById("hasil").innerHTML =
          "Halo " + nama + "!";
         }

         function hitung() {

         let angka1 =
          Number(document.getElementById("angka1").value);

         let angka2 =
          Number(document.getElementById("angka2").value);

         let hasil = angka1 + angka2;

         document.getElementById("hasilHitung").innerHTML =
         "Hasil: " + hasil;
         }
         function cekTebakan() {

         let tebakan =
         Number(document.getElementById("tebakan").value);
 
         if (tebakan < angkaRahasia) {

         document.getElementById("hasilTebakan").innerHTML =
         "Terlalu kecil!";

         } else if (tebakan > angkaRahasia) {

         document.getElementById("hasilTebakan").innerHTML =
         "Terlalu besar!";

         } else {

         document.getElementById("hasilTebakan").innerHTML =
         "🎉 Selamat! Tebakan benar!";
         }
         }
         
         function tambahTugas() {
   
         let tugas =
         document.getElementById("todoInput").value;

          let list =
          document.getElementById("daftarTugas");

          list.innerHTML +=
         `<li onclick="this.classList.toggle('selesai')">
         ${tugas}
         <button onclick="event.stopPropagation(); this.parentElement.remove()">❌</button>
          </li>`;

          document.getElementById("todoInput").value = "";
}
     </script>

    

          

    </div>

</body>
 </html>
